<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | WaveKind FM
    <link rel="icon" type="image/svg+xml" href="Asserts/Images/favicon.svg">
    <link rel="stylesheet" href="Boostrap/bootstrap-icons/bootstrap-icons.css">
    <style>
        :root {
            --accent: #d90429;
            --accent-dark: #d90429;
            --bg: #111827;
            --card: #1f2937;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        /* Animated background grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 10%, transparent 100%);
        }

        /* Glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Radio wave animation */
        .wave-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            height: 60px;
            margin-bottom: 2.5rem;
        }

        .wave-bar {
            width: 6px;
            border-radius: 3px;
            background: var(--accent);
            animation: wave-anim 1.4s ease-in-out infinite;
            box-shadow: 0 0 12px var(--accent);
        }

        .wave-bar:nth-child(1) {
            height: 20px;
            animation-delay: 0.0s;
        }

        .wave-bar:nth-child(2) {
            height: 40px;
            animation-delay: 0.1s;
        }

        .wave-bar:nth-child(3) {
            height: 55px;
            animation-delay: 0.2s;
        }

        .wave-bar:nth-child(4) {
            height: 35px;
            animation-delay: 0.3s;
        }

        .wave-bar:nth-child(5) {
            height: 60px;
            animation-delay: 0.4s;
        }

        .wave-bar:nth-child(6) {
            height: 45px;
            animation-delay: 0.5s;
        }

        .wave-bar:nth-child(7) {
            height: 55px;
            animation-delay: 0.4s;
        }

        .wave-bar:nth-child(8) {
            height: 35px;
            animation-delay: 0.3s;
        }

        .wave-bar:nth-child(9) {
            height: 55px;
            animation-delay: 0.2s;
        }

        .wave-bar:nth-child(10) {
            height: 40px;
            animation-delay: 0.1s;
        }

        .wave-bar:nth-child(11) {
            height: 20px;
            animation-delay: 0.0s;
        }

        @keyframes wave-anim {

            0%,
            100% {
                transform: scaleY(0.4);
                opacity: 0.5;
            }

            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        /* 404 number */
        .err-number {
            font-size: clamp(7rem, 20vw, 12rem);
            font-weight: 600;
            line-height: 1;
            letter-spacing: -4px;
            color: transparent;
            -webkit-text-stroke: 2px var(--accent);
            text-shadow: 0 0 60px rgba(255, 77, 109, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
            margin-bottom: 0.5rem;
            user-select: none;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                text-shadow: 0 0 40px rgba(255, 77, 109, 0.3);
            }

            50% {
                text-shadow: 0 0 80px rgba(255, 77, 109, 0.6);
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.3);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(255, 77, 109, 0.35);
        }

        .btn-home:hover {
            background: var(--accent-dark);
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(255, 77, 109, 0.45);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">

        <a href="index.html" class="logo">
            <div class="logo-mark"><i class="bi bi-broadcast-pin"></i></div>
            <span class="logo-text">WaveKind FM</span>
        </a>

        <div class="wave-wrap">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <div class="err-number">404</div>

        <div class="badge">
            <i class="bi bi-broadcast"></i>
            Signal Lost
        </div>

        <h1>Page Not Found</h1>
        <p>Looks like this frequency doesn't exist. The page you're looking for may have been moved, deleted, or never
            existed.</p>

        <a href="index.html" class="btn-home">
            <i class="bi bi-house-fill"></i>
            Back to Home
        </a>

    </div>

</body>

</html>
