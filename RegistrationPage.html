<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - WaveKind FM</title>
    <meta name="description" content="Sign up for WaveKind FM - Community Radio Platform">

    <link rel="icon" type="image/jpeg" href="Asserts/Images/favicon.jpg">
    
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons for WaveKind brand -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#ff4d6d', secondary: '#ff4d6d', base: '#000000',
                        cream: '#FFFFFF', warmgray: '#9CA3AF', charcoal: '#111827', 'card-dark': '#1f2937'
                    },
                    animation: { 'fadeInUp': 'fadeInUp 0.4s ease-out' },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(20px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            .form-input {
                @apply w-full pl-10 pr-10 py-1.5 border bg-transparent rounded-xl focus:border-secondary focus:ring-1 focus:ring-secondary transition-all outline-none text-sm font-medium;
            }
            .input-icon {
                @apply absolute top-1/2 -translate-y-1/2 text-gray-400 left-3.5 text-sm;
            }
            .form-label {
                @apply block text-[var(--text-heading)] font-semibold mb-1 text-[10px] md:text-xs uppercase tracking-wider;
            }
        }
    </style>
    
    <style>
        :root {
            --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #374151;
            --text-heading: #000000; --border-color: #E5E7EB; --input-border: #D1D5DB;
        }
        [data-theme="dark"] {
            --bg-color: #111827; --card-bg: #1f2937; --text-main: #E5E7EB;
            --text-heading: #FFFFFF; --border-color: #374151; --input-border: #4B5563;
        }
        html, body {
            margin: 0; padding: 0; min-height: 100vh; font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .form-input { border-color: var(--input-border); color: var(--text-main); background-color: var(--bg-color); }
        .form-input::placeholder { color: #9CA3AF; }
        .card-toggle-btn { background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); }
        .card-toggle-btn:hover { color: var(--secondary-color); border-color: var(--secondary-color); }
    </style>
</head>
<body class="w-full overflow-x-hidden m-0 p-0 antialiased bg-theme-main text-body-theme relative">

    <nav class="fixed top-0 left-0 w-full h-[65px] z-50 flex justify-between items-center px-6 border-b border-[var(--border-color)] shadow-sm bg-[var(--bg-color)]/80 backdrop-blur-md transition-colors duration-300">
        <a href="index.html" class="flex items-center gap-2.5 no-underline font-[800] text-2xl group">
            <div class="bg-[#ff4d6d] w-[38px] h-[38px] rounded-[10px] flex items-center justify-center text-white">
                <i class="bi bi-broadcast-pin"></i>
            </div>
            <span class="text-[var(--text-heading)] transition-colors duration-300 group-hover:text-[#ff4d6d]">WaveKind FM</span>
        </a>
        
        <div class="flex items-center gap-[11.2px] shrink-0">
            <button id="themeToggle" class="w-[40px] h-[40px] inline-flex items-center justify-center rounded-xl bg-[var(--card-bg)] border border-[var(--border-color)] text-[var(--text-main)] cursor-pointer transition-all duration-300 hover:bg-[#ff4d6d] hover:text-white hover:-translate-y-0.5 hover:border-[#ff4d6d]" title="Toggle Dark Mode">
                <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
            </button>
            <button id="rtlToggle" class="w-[40px] h-[40px] inline-flex items-center justify-center rounded-xl bg-[var(--card-bg)] border border-[var(--border-color)] text-[var(--text-main)] cursor-pointer transition-all duration-300 hover:bg-[#ff4d6d] hover:text-white hover:-translate-y-0.5 hover:border-[#ff4d6d]" title="Toggle RTL">
                <i class="bi bi-text-paragraph text-lg"></i>
            </button>
        </div>
    </nav>

<section class="flex flex-col items-center justify-center min-h-screen px-4 pt-10 pb-2">        <div class="absolute top-0 left-0 w-96 h-96 bg-[#ff4d6d]/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-[#ff4d6d]/20 dark:bg-white/5 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-[340px] md:max-w-[360px] bg-[var(--card-bg)] rounded-3xl shadow-2xl border border-[var(--border-color)] animate-fadeInUp p-3 md:p-4 relative z-10 flex flex-col">
            
            <div class="mb-3 mt-1 text-center">
                <div class="w-10 h-10 bg-[#ff4d6d]/10 rounded-2xl flex items-center justify-center mx-auto mb-2">
                    <i class="bi bi-headphones text-xl text-[#ff4d6d]"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-semibold text-[var(--text-heading)] mb-0.5">Create Account</h1>
                <p class="text-[var(--text-main)] opacity-80 text-[10px] font-medium">Start your journey with WaveKind FM</p>
            </div>

            <div id="signupForm" class="flex-1 flex flex-col justify-between">
                <form id="signupFormElement" class="space-y-2.5">
                    
                    <div>
                        <label class="form-label" for="fullName">Full Name</label>
                        <div class="relative">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" placeholder="Alex Rivera" required class="form-input" id="fullName" autocomplete="name">
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="signupEmail">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" placeholder="alex@wavekind.fm" required class="form-input" id="signupEmail" autocomplete="email">
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="signupPassword">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="signupPassword" placeholder="Create a strong password" required class="form-input" autocomplete="new-password">
                            <button type="button" onclick="togglePasswordVisibility('signupPassword', 'signupEyeIcon')" class="absolute top-1/2 -translate-y-1/2 right-3.5 text-gray-400 hover:text-[var(--text-heading)] focus:outline-none cursor-pointer bg-transparent border-0 p-0 transition-colors">
                                <i class="fas fa-eye text-sm" id="signupEyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
                        <div class="relative">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="signupConfirmPassword" placeholder="Repeat your password" required class="form-input" autocomplete="new-password">
                            <button type="button" onclick="togglePasswordVisibility('signupConfirmPassword', 'signupConfirmEyeIcon')" class="absolute top-1/2 -translate-y-1/2 right-3.5 text-gray-400 hover:text-[var(--text-heading)] focus:outline-none cursor-pointer bg-transparent border-0 p-0 transition-colors">
                                <i class="fas fa-eye text-sm" id="signupConfirmEyeIcon"></i>
                            </button>
                        </div>
                    </div>
<div class="flex items-center gap-2">
    <div class="flex items-center">
                            <input id="terms" type="checkbox" required class="w-3.5 h-3.5 text-[#ff4d6d] rounded border-gray-300 focus:ring-[#ff4d6d] bg-transparent cursor-pointer">
                        </div>
                        <label for="terms" class="text-[var(--text-main)] text-[10px] font-medium leading-tight cursor-pointer">
                            I agree to the <a href="#" class="text-[#ff4d6d] font-semibold hover:underline">Terms</a> and <a href="#" class="text-[#ff4d6d] font-semibold hover:underline">Privacy Policy</a>.
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-[#ff4d6d] text-white hover:bg-[#e63956] py-2 rounded-xl font-semibold text-sm transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 border-0 cursor-pointer" id="signupButton">
                        Create Accoudnt
                    </button>
                </form>

                <!-- Social Sign Up Section -->
                <div class="mt-3">
                    <div class="relative flex items-center py-1 mb-2">
                        <div class="flex-grow border-t border-[var(--border-color)]"></div>
                        <span class="flex-shrink-0 mx-3 text-[var(--text-main)] opacity-60 text-[9px] font-semibold uppercase tracking-wider">Or sign up with</span>
                        <div class="flex-grow border-t border-[var(--border-color)]"></div>
                    </div>

                    <div class="flex gap-2 w-full mb-2">
                        <button type="button" onclick="socialSignup('Google')" class="flex-1 flex items-center justify-center gap-2 py-2 border border-[var(--border-color)] rounded-xl transition-all duration-300 hover:border-[#ff4d6d] hover:bg-[#ff4d6d]/10 cursor-pointer bg-[var(--card-bg)]">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google">
                            <span class="text-xs font-medium hidden sm:inline text-[var(--text-main)]">Google</span>
                        </button>
                        <button type="button" onclick="socialSignup('Apple')" class="flex-1 flex items-center justify-center gap-2 py-2 border border-[var(--border-color)] rounded-xl transition-all duration-300 hover:border-[#ff4d6d] hover:bg-[#ff4d6d]/10 cursor-pointer bg-[var(--card-bg)]">
<i class="fab fa-apple text-base text-[var(--text-main)] dark:text-white"></i>                            <span class="text-xs font-medium hidden sm:inline text-[var(--text-main)]">Apple</span>
                        </button>
                       <button class="flex-1 flex items-center justify-center gap-2 py-2 border border-[var(--border-color)] rounded-xl transition-all duration-300 hover:border-[#1877F2] hover:bg-[#1877F2]/10 cursor-pointer bg-[var(--card-bg)]">
    <i class="fab fa-facebook-f text-base !text-[#1877F2]"></i>
    <span class="text-xs font-medium hidden sm:inline text-[var(--text-main)]">Facebook</span>
</button>
                    </div>

                    <p class="text-center text-xs text-[var(--text-main)] font-medium">
                        Already have an account? 
                        <a href="LoginPage.html" class="text-[#ff4d6d] font-semibold hover:underline ml-1">Log In</a>
                    </p>
                </div>
            </div>

        </div>
    </section>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById("themeToggle");
        const htmlElement = document.documentElement;
        
        function updateThemeIcon() {
            const isDark = htmlElement.classList.contains('dark');
            const themeIcon = document.getElementById("themeIcon");
            if (themeIcon) {
                themeIcon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
            }
        }
        
        function toggleDarkMode() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            htmlElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }
        
        if (themeToggle) themeToggle.addEventListener("click", toggleDarkMode);
        
        const savedTheme = localStorage.getItem('theme') || 'dark'; 
        if (savedTheme === 'dark') {
            htmlElement.classList.add("dark");
            htmlElement.setAttribute('data-theme', 'dark');
        } else {
            htmlElement.classList.remove("dark");
            htmlElement.setAttribute('data-theme', 'light');
        }
        updateThemeIcon();

        // RTL Logic
        const rtlToggle = document.getElementById("rtlToggle");
        
        function toggleRTL() {
            const current = htmlElement.getAttribute("dir") || "ltr";
            const next = current === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", next);
            localStorage.setItem("direction", next);
        }
        
        if (rtlToggle) rtlToggle.addEventListener("click", toggleRTL);
        
        if (localStorage.getItem("direction") === "rtl") {
            htmlElement.setAttribute("dir", "rtl");
        }

        // Password Visibility Toggle
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input && icon) {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }
        }

        // Social Signup Function
        function socialSignup(provider) {
            const btns = document.querySelectorAll('.flex-1.flex.items-center');
            let targetBtn = null;
            for (let btn of btns) {
                if (btn.innerText.includes(provider)) {
                    targetBtn = btn;
                    break;
                }
            }
            if (targetBtn) {
                const originalHtml = targetBtn.innerHTML;
                targetBtn.innerHTML = '<i class="fas fa-spinner fa-spin text-[#ff4d6d]"></i>';
                targetBtn.disabled = true;
                setTimeout(() => {
                    localStorage.setItem('wavekind_logged_in', 'true');
                    localStorage.setItem('wavekind_social_provider', provider);
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                setTimeout(() => {
                    localStorage.setItem('wavekind_logged_in', 'true');
                    window.location.href = 'index.html';
                }, 800);
            }
        }

        // Sign Up Submission
        document.getElementById('signupFormElement').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('signupEmail').value;
            const pwd = document.getElementById('signupPassword').value;
            const confirmPwd = document.getElementById('signupConfirmPassword').value;
            const termsCheckbox = document.getElementById('terms');
            
            if (!fullName || !email || !pwd || !confirmPwd) {
                alert("Please fill in all fields");
                return;
            }
            
            if (pwd !== confirmPwd) {
                alert("Passwords do not match!");
                return;
            }
            
            if (pwd.length < 6) {
                alert("Password must be at least 6 characters long");
                return;
            }
            
            if (!termsCheckbox.checked) {
                alert("Please agree to the Terms and Privacy Policy");
                return;
            }

            const btn = document.getElementById('signupButton');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Creating...';
            btn.disabled = true;
            
            setTimeout(() => {
                // Store user data in localStorage
                const users = JSON.parse(localStorage.getItem('wavekind_users') || '[]');
                const newUser = {
                    name: fullName,
                    email: email,
                    joinedDate: new Date().toISOString()
                };
                users.push(newUser);
                localStorage.setItem('wavekind_users', JSON.stringify(users));
                localStorage.setItem('wavekind_logged_in', 'true');
                localStorage.setItem('wavekind_user_email', email);
                localStorage.setItem('wavekind_user_name', fullName);
                
                alert('Account created successfully! Welcome to WaveKind FM!');
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
